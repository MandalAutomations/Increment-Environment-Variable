name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next major version
        id: ver
        run: |
          HIGHEST=$(git tag --list 'v*' | grep -E '^v[0-9]+$' | sed 's/^v//' | sort -n | tail -1)
          NEXT=$(( ${HIGHEST:-0} + 1 ))
          echo "major=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next major: v${NEXT}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Configure git
        run: |
          git config user.name evanallen13
          git config user.email evanallen12@gmail.com

      - name: Commit built dist to release branch
        env:
          MAJOR: ${{ steps.ver.outputs.major }}
        run: |
          BRANCH="release/v${MAJOR}"
          git checkout -B "$BRANCH"
          git add dist
          if git diff --cached --quiet; then
            echo "No dist changes to commit."
          else
            git commit -m "Release v${MAJOR}"
          fi
          git push --force-with-lease origin "$BRANCH"

      - name: Tag release
        env:
          MAJOR: ${{ steps.ver.outputs.major }}
        run: |
          git tag -fa "v${MAJOR}" -m "Release v${MAJOR}"
          git push --force origin "v${MAJOR}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAJOR: ${{ steps.ver.outputs.major }}
        run: |
          gh release create "v${MAJOR}" \
            --title "Release v${MAJOR}" \
            --notes "Changes in this Release" \
            --target "release/v${MAJOR}" || \
          gh release edit "v${MAJOR}" \
            --title "Release v${MAJOR}" \
            --notes "Changes in this Release" \
            --target "release/v${MAJOR}"
