name: "Increment Environment Variable"
author: "evanallen13"
description: "Action to increment an Environment variable by 1."

branding:
  icon: 'play'
  color: 'purple'

inputs:
  Name:
    description: "Name of variable to increment"
    required: true

  RepoId:
    description: "Repository ID, e.g. ${{ github.repository_id }}"
    required: true

  EnvironmentName:
    description: "Name of the environment to update"
    required: true

  Token:
    description: "Personal Access Token with permission to write environment variables (classic: 'repo' scope; fine-grained: Variables: read & write + Environments: read & write)"
    required: true

runs:
  using: node20
  main: 'dist/index.js'
  